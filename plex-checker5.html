<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Plex Movie Checker</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #111; color: #eee; min-height: 100vh; padding: 2rem 1rem; }
.wrap { max-width: 580px; margin: 0 auto; }
h1 { font-size: 22px; font-weight: 500; margin-bottom: 1.5rem; color: #fff; }
.card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
.card-title { font-size: 11px; font-weight: 500; color: #888; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px; }
.field { margin-bottom: 10px; }
.field label { font-size: 13px; color: #999; display: block; margin-bottom: 4px; }
.field input, .field textarea { width: 100%; background: #222; border: 1px solid #333; border-radius: 8px; padding: 8px 12px; font-size: 14px; color: #eee; outline: none; font-family: inherit; }
.field textarea { resize: vertical; min-height: 100px; }
.field input:focus, .field textarea:focus { border-color: #555; }
.tabs { display: flex; gap: 8px; margin-bottom: 1rem; }
.tab { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: #888; font-size: 14px; font-weight: 500; cursor: pointer; text-align: center; }
.tab.active { background: #2a2a2a; color: #eee; border-color: #555; }
.search-row { display: flex; gap: 8px; margin-bottom: 1rem; }
.search-row input { flex: 1; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 10px 14px; font-size: 15px; color: #eee; outline: none; }
.search-row input:focus { border-color: #555; }
.btn { padding: 10px 20px; border-radius: 8px; border: 1px solid #444; background: #2a2a2a; color: #eee; font-size: 14px; font-weight: 500; cursor: pointer; white-space: nowrap; }
.btn:hover { background: #333; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-full { width: 100%; margin-top: 8px; }
.upload-zone { border: 2px dashed #333; border-radius: 12px; padding: 1.5rem; text-align: center; cursor: pointer; background: #1a1a1a; margin-bottom: 1rem; position: relative; }
.upload-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.preview-img { width: 100%; max-height: 200px; object-fit: contain; border-radius: 8px; margin-bottom: 1rem; display: none; }
.result { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 1.25rem; margin-top: 1rem; display: none; }
.r-title { font-size: 18px; font-weight: 500; margin-bottom: 14px; color: #fff; }
.badge { font-size: 13px; font-weight: 500; padding: 4px 12px; border-radius: 8px; display: inline-flex; align-items: center; gap: 6px; }
.b-yes { background: #1a3a1a; color: #5cb85c; border: 1px solid #2d5a2d; }
.b-no { background: #3a1a1a; color: #e05555; border: 1px solid #5a2d2d; }
.b-wait { background: #222; color: #888; border: 1px solid #333; }
.bulk-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-top: 1px solid #2a2a2a; gap: 10px; }
.bulk-item:first-child { border-top: none; }
.bulk-title { font-size: 14px; color: #eee; flex: 1; }
.matches { margin-top: 12px; }
.match-item { padding: 8px 0; border-top: 1px solid #2a2a2a; }
.match-title { font-size: 14px; font-weight: 500; color: #eee; }
.match-meta { font-size: 12px; color: #666; margin-top: 2px; }
.err { font-size: 13px; color: #e05555; margin-top: 8px; }
.spinner { width: 12px; height: 12px; border: 2px solid #444; border-top-color: #888; border-radius: 50%; animation: spin 0.6s linear infinite; display: inline-block; }
@keyframes spin { to { transform: rotate(360deg); } }
.panel { display: none; }
.panel.active { display: block; }
.saved { font-size: 12px; color: #5cb85c; margin-top: 6px; display: none; }
.progress { font-size: 13px; color: #888; margin-bottom: 10px; }
.hint { font-size: 12px; color: #555; margin-top: 4px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Plex Movie Checker</h1>
  <div class="card">
    <div class="card-title">Config</div>
    <div class="field">
      <label>Server URL</label>
      <input id="plexUrl" value="https://192-168-50-203.79edeb32057a4ea5808c4d1b0dee3269.plex.direct:32400" />
      <div class="hint">Requires Tailscale to be on</div>
    </div>
    <div class="field">
      <label>Plex token</label>
      <input id="plexToken" type="password" value="eixp7UGkmj8hcMhpdpU6" />
    </div>
    <div class="field">
      <label>Anthropic API key <span style="color:#555;">(only needed for photo tab)</span></label>
      <input id="anthropicKey" type="password" placeholder="sk-ant-api03-..." />
      <div class="hint">Get from console.anthropic.com</div>
    </div>
    <button class="btn btn-full" onclick="saveConfig()">Save config</button>
    <div class="saved" id="savedMsg">Saved!</div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('single',this)">Single title</div>
    <div class="tab" onclick="switchTab('bulk',this)">Bulk search</div>
    <div class="tab" onclick="switchTab('photo',this)">Photo</div>
  </div>

  <div class="panel active" id="panel-single">
    <div class="search-row">
      <input id="searchInput" placeholder="e.g. Iron Man" onkeydown="if(event.key==='Enter')doSearch()" />
      <button class="btn" onclick="doSearch()">Check</button>
    </div>
    <div class="result" id="resultSingle">
      <div class="r-title" id="rTitle"></div>
      <span class="badge b-wait" id="badge"><span class="spinner"></span> Checking...</span>
      <div class="matches" id="matches"></div>
      <div class="err" id="rErr"></div>
    </div>
  </div>

  <div class="panel" id="panel-bulk">
    <div class="field">
      <label>Paste movie titles (one per line, bullets ok)</label>
      <textarea id="bulkInput" placeholder="Tron&#10;Tron: Legacy&#10;* The Dark Knight&#10;- Inception (2010)"></textarea>
    </div>
    <button class="btn btn-full" onclick="doBulk()">Check all</button>
    <div class="result" id="resultBulk">
      <div class="progress" id="bulkProgress"></div>
      <div id="bulkList"></div>
    </div>
  </div>

  <div class="panel" id="panel-photo">
    <img id="preview" class="preview-img" alt="preview" />
    <div class="upload-zone">
      <input type="file" id="fileInput" accept="image/*" onchange="handleFile(this)" />
      <div style="font-size:24px;margin-bottom:6px;">📷</div>
      <div style="font-size:14px;color:#888;">Upload a photo of a movie<br><span style="font-size:12px;color:#555;">poster, DVD case, title on screen</span></div>
    </div>
    <button class="btn btn-full" id="photoBtn" onclick="doPhoto()" disabled>Identify &amp; Check</button>
    <div class="result" id="resultPhoto">
      <div class="r-title" id="rPhotoTitle"></div>
      <span class="badge b-wait" id="photoBadge"><span class="spinner"></span> Checking...</span>
      <div class="matches" id="photoMatches"></div>
      <div class="err" id="rPhotoErr"></div>
    </div>
  </div>
</div>

<script>
let imageBase64 = null;

function switchTab(mode, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + mode).classList.add('active');
}

function loadConfig() {
  const s = localStorage.getItem('plexCheckerConfig');
  if (s) {
    const c = JSON.parse(s);
    if (c.plexUrl) document.getElementById('plexUrl').value = c.plexUrl;
    if (c.plexToken) document.getElementById('plexToken').value = c.plexToken;
    if (c.anthropicKey) document.getElementById('anthropicKey').value = c.anthropicKey;
  }
}

function saveConfig() {
  localStorage.setItem('plexCheckerConfig', JSON.stringify({
    plexUrl: document.getElementById('plexUrl').value.trim(),
    plexToken: document.getElementById('plexToken').value.trim(),
    anthropicKey: document.getElementById('anthropicKey').value.trim()
  }));
  const msg = document.getElementById('savedMsg');
  msg.style.display = 'block';
  setTimeout(() => msg.style.display = 'none', 2000);
}

function parseTitle(line) {
  return line.replace(/^[\*\-\u2022\+]\s*/, '').replace(/\s*\(\d{4}\)\s*$/, '').trim();
}

function handleFile(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    imageBase64 = e.target.result.split(',')[1];
    document.getElementById('preview').src = e.target.result;
    document.getElementById('preview').style.display = 'block';
    document.getElementById('photoBtn').disabled = false;
  };
  reader.readAsDataURL(file);
}

async function checkPlex(title) {
  const plexUrl = document.getElementById('plexUrl').value.trim();
  const plexToken = document.getElementById('plexToken').value.trim();
  const res = await fetch(plexUrl + '/library/search?query=' + encodeURIComponent(title) + '&type=1&X-Plex-Token=' + plexToken);
  if (!res.ok) throw new Error('Plex error ' + res.status);
  const xml = await res.text();
  const doc = new DOMParser().parseFromString(xml, 'text/xml');
  const items = Array.from(doc.querySelectorAll('Video'));
  const q = title.toLowerCase().substring(0, Math.min(title.length, 10));
  return items.filter(item => (item.getAttribute('title') || '').toLowerCase().includes(q));
}

function renderMatches(matches, badgeEl, matchesEl) {
  if (matches.length === 0) {
    badgeEl.className = 'badge b-no';
    badgeEl.textContent = 'Not in Plex';
  } else {
    badgeEl.className = 'badge b-yes';
    badgeEl.textContent = matches.length === 1 ? 'Found in Plex!' : matches.length + ' matches';
    matchesEl.innerHTML = matches.map(item => {
      const t = item.getAttribute('title') || '';
      const y = item.getAttribute('year') || '';
      const lib = item.getAttribute('librarySectionTitle') || '';
      return '<div class="match-item"><div class="match-title">' + t + '</div><div class="match-meta">' + [y, lib].filter(Boolean).join(' · ') + '</div></div>';
    }).join('');
  }
}

async function doSearch() {
  const title = document.getElementById('searchInput').value.trim();
  if (!title) return;
  const rc = document.getElementById('resultSingle');
  rc.style.display = 'block';
  document.getElementById('rTitle').textContent = title;
  const badge = document.getElementById('badge');
  badge.className = 'badge b-wait';
  badge.innerHTML = '<span class="spinner"></span> Checking...';
  document.getElementById('matches').innerHTML = '';
  document.getElementById('rErr').textContent = '';
  try {
    const matches = await checkPlex(title);
    renderMatches(matches, badge, document.getElementById('matches'));
  } catch(e) {
    badge.className = 'badge b-no';
    badge.textContent = 'Error';
    document.getElementById('rErr').textContent = e.message + ' — make sure Tailscale is on.';
  }
}

async function doBulk() {
  const raw = document.getElementById('bulkInput').value.trim();
  if (!raw) return;
  const titles = raw.split('\n').map(l => parseTitle(l.trim())).filter(Boolean);
  const rc = document.getElementById('resultBulk');
  const list = document.getElementById('bulkList');
  const progress = document.getElementById('bulkProgress');
  rc.style.display = 'block';
  list.innerHTML = titles.map((t, i) =>
    '<div class="bulk-item" id="bi' + i + '"><div class="bulk-title">' + t + '</div><span class="badge b-wait"><span class="spinner"></span></span></div>'
  ).join('');
  for (let i = 0; i < titles.length; i++) {
    progress.textContent = 'Checking ' + (i + 1) + ' of ' + titles.length + '...';
    const row = document.getElementById('bi' + i);
    const badge = row.querySelector('.badge');
    try {
      const matches = await checkPlex(titles[i]);
      badge.className = matches.length > 0 ? 'badge b-yes' : 'badge b-no';
      badge.textContent = matches.length > 0 ? 'In Plex' : 'Not found';
    } catch(e) {
      badge.className = 'badge b-no';
      badge.textContent = 'Error';
    }
    await new Promise(r => setTimeout(r, 300));
  }
  progress.textContent = 'Done!';
}

async function doPhoto() {
  if (!imageBase64) return;
  const btn = document.getElementById('photoBtn');
  const rc = document.getElementById('resultPhoto');
  const photoBadge = document.getElementById('photoBadge');
  const photoMatches = document.getElementById('photoMatches');
  const rPhotoErr = document.getElementById('rPhotoErr');
  btn.disabled = true;
  btn.textContent = 'Identifying...';
  rc.style.display = 'block';
  document.getElementById('rPhotoTitle').textContent = 'Identifying...';
  photoBadge.className = 'badge b-wait';
  photoBadge.innerHTML = '<span class="spinner"></span> Identifying...';
  photoMatches.innerHTML = '';
  rPhotoErr.textContent = '';

  const apiKey = document.getElementById('anthropicKey').value.trim();
  if (!apiKey) {
    rPhotoErr.textContent = 'Please add your Anthropic API key in the config above to use photo search.';
    btn.disabled = false;
    btn.textContent = 'Identify & Check';
    photoBadge.className = 'badge b-no';
    photoBadge.textContent = 'No API key';
    return;
  }

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 300,
        messages: [{ role: 'user', content: [
          { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: imageBase64 } },
          { type: 'text', text: 'Identify the movie. Respond ONLY with JSON, no markdown: {"title":"Exact Title","year":2023,"note":"only if unsure"}' }
        ]}]
      })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    const raw = (data.content || []).map(b => b.text || '').join('').replace(/```json|```/g, '').trim();
    if (!raw) throw new Error('Empty response — check your API key');
    const movie = JSON.parse(raw);
    document.getElementById('rPhotoTitle').textContent = movie.title + (movie.year ? ' (' + movie.year + ')' : '');
    btn.disabled = false;
    btn.textContent = 'Identify & Check';
    photoBadge.innerHTML = '<span class="spinner"></span> Checking Plex...';
    const matches = await checkPlex(movie.title);
    renderMatches(matches, photoBadge, photoMatches);
  } catch(e) {
    document.getElementById('rPhotoTitle').textContent = 'Error';
    photoBadge.className = 'badge b-no';
    photoBadge.textContent = 'Failed';
    rPhotoErr.textContent = e.message;
    btn.disabled = false;
    btn.textContent = 'Identify & Check';
  }
}

loadConfig();
</script>
</body>
</html>
