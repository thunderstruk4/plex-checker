<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Plex Movie Checker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #111; color: #eee; min-height: 100vh; padding: 2rem 1rem; }
  .wrap { max-width: 560px; margin: 0 auto; }
  h1 { font-size: 22px; font-weight: 500; margin-bottom: 1.5rem; color: #fff; }
  .card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
  .card-title { font-size: 11px; font-weight: 500; color: #888; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px; }
  .field { margin-bottom: 10px; }
  .field label { font-size: 13px; color: #999; display: block; margin-bottom: 4px; }
  .field input { width: 100%; background: #222; border: 1px solid #333; border-radius: 8px; padding: 8px 12px; font-size: 14px; color: #eee; outline: none; }
  .field input:focus { border-color: #555; }
  .tabs { display: flex; gap: 8px; margin-bottom: 1rem; }
  .tab { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: #888; font-size: 14px; font-weight: 500; cursor: pointer; text-align: center; }
  .tab.active { background: #2a2a2a; color: #eee; border-color: #555; }
  .search-row { display: flex; gap: 8px; margin-bottom: 1rem; }
  .search-row input { flex: 1; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 10px 14px; font-size: 15px; color: #eee; outline: none; }
  .btn { padding: 10px 20px; border-radius: 8px; border: 1px solid #444; background: #2a2a2a; color: #eee; font-size: 14px; font-weight: 500; cursor: pointer; white-space: nowrap; }
  .btn:hover { background: #333; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-full { width: 100%; margin-top: 8px; }
  .upload-zone { border: 2px dashed #333; border-radius: 12px; padding: 2rem; text-align: center; cursor: pointer; background: #1a1a1a; margin-bottom: 1rem; position: relative; }
  .upload-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .preview-img { width: 100%; max-height: 220px; object-fit: contain; border-radius: 8px; margin-bottom: 1rem; display: none; }
  .result { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 1.25rem; margin-top: 1rem; display: none; }
  .r-title { font-size: 20px; font-weight: 500; margin-bottom: 14px; color: #fff; }
  .badge { font-size: 14px; font-weight: 500; padding: 6px 16px; border-radius: 8px; display: inline-flex; align-items: center; gap: 6px; }
  .b-yes { background: #1a3a1a; color: #5cb85c; border: 1px solid #2d5a2d; }
  .b-no { background: #3a1a1a; color: #e05555; border: 1px solid #5a2d2d; }
  .b-wait { background: #222; color: #888; border: 1px solid #333; }
  .matches { margin-top: 14px; }
  .match-item { padding: 10px 0; border-top: 1px solid #2a2a2a; }
  .match-title { font-size: 15px; font-weight: 500; color: #eee; }
  .match-meta { font-size: 12px; color: #666; margin-top: 3px; }
  .err { font-size: 13px; color: #e05555; margin-top: 10px; }
  .note { font-size: 12px; color: #666; margin-top: 8px; }
  .spinner { width: 13px; height: 13px; border: 2px solid #444; border-top-color: #888; border-radius: 50%; animation: spin 0.6s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .panel { display: none; }
  .panel.active { display: block; }
  .saved { font-size: 12px; color: #5cb85c; margin-top: 6px; display: none; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Plex Movie Checker</h1>
  <div class="card">
    <div class="card-title">Plex config</div>
    <div class="field"><label>Server URL</label><input id="plexUrl" value="https://192-168-50-203.79edeb32057a4ea5808c4d1b0dee3269.plex.direct:32400" /></div>
    <div class="field"><label>Plex token</label><input id="plexToken" type="password" value="eixp7UGkmj8hcMhpdpU6" /></div>
    <button class="btn btn-full" onclick="saveConfig()">Save config</button>
    <div class="saved" id="savedMsg">Saved!</div>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('text',this)">Type a title</div>
    <div class="tab" onclick="switchTab('photo',this)">Upload a photo</div>
  </div>
  <div class="panel active" id="panel-text">
    <div class="search-row">
      <input id="searchInput" placeholder="e.g. Iron Man" onkeydown="if(event.key==='Enter')doSearch()" />
      <button class="btn" onclick="doSearch()">Check</button>
    </div>
  </div>
  <div class="panel" id="panel-photo">
    <img id="preview" class="preview-img" alt="preview" />
    <div class="upload-zone">
      <input type="file" id="fileInput" accept="image/*" onchange="handleFile(this)" />
      <div style="font-size:28px;margin-bottom:8px;">📷</div>
      <div style="font-size:14px;color:#888;">Upload a photo of a movie<br><span style="font-size:12px;color:#555;">poster, DVD case, title on screen</span></div>
    </div>
    <button class="btn btn-full" id="photoBtn" onclick="doPhoto()" disabled>Identify &amp; Check</button>
  </div>
  <div class="result" id="resultCard">
    <div class="r-title" id="rTitle"></div>
    <span class="badge b-wait" id="badge"><span class="spinner"></span> Checking Plex...</span>
    <div class="matches" id="matches"></div>
    <div class="note" id="rNote"></div>
    <div class="err" id="rErr"></div>
  </div>
</div>
<script>
let imageBase64 = null;
function switchTab(mode, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + mode).classList.add('active');
  document.getElementById('resultCard').style.display = 'none';
}
function loadConfig() {
  const s = localStorage.getItem('plexCheckerStandalone');
  if (s) {
    const c = JSON.parse(s);
    if (c.plexUrl) document.getElementById('plexUrl').value = c.plexUrl;
    if (c.plexToken) document.getElementById('plexToken').value = c.plexToken;
  }
}
function saveConfig() {
  localStorage.setItem('plexCheckerStandalone', JSON.stringify({
    plexUrl: document.getElementById('plexUrl').value.trim(),
    plexToken: document.getElementById('plexToken').value.trim()
  }));
  const msg = document.getElementById('savedMsg');
  msg.style.display = 'block';
  setTimeout(() => msg.style.display = 'none', 2000);
}
function handleFile(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    imageBase64 = e.target.result.split(',')[1];
    const p = document.getElementById('preview');
    p.src = e.target.result;
    p.style.display = 'block';
    document.getElementById('photoBtn').disabled = false;
  };
  reader.readAsDataURL(file);
}
function showLoading(title) {
  document.getElementById('resultCard').style.display = 'block';
  document.getElementById('rTitle').textContent = title;
  document.getElementById('badge').className = 'badge b-wait';
  document.getElementById('badge').innerHTML = '<span class="spinner"></span> Checking Plex...';
  document.getElementById('matches').innerHTML = '';
  document.getElementById('rNote').textContent = '';
  document.getElementById('rErr').textContent = '';
}
async function doSearch() {
  const title = document.getElementById('searchInput').value.trim();
  if (!title) return;
  showLoading(title);
  await checkPlex(title, null);
}
async function doPhoto() {
  if (!imageBase64) return;
  const btn = document.getElementById('photoBtn');
  btn.disabled = true;
  btn.textContent = 'Identifying...';
  showLoading('Identifying movie...');
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 300,
        messages: [{ role: 'user', content: [
          { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: imageBase64 } },
          { type: 'text', text: 'Identify the movie. Respond ONLY with JSON, no markdown: {"title":"Exact Title","year":2023,"note":"only if unsure"}' }
        ]}]
      })
    });
    const data = await res.json();
    const raw = data.content.map(b => b.text || '').join('').replace(/```json|```/g, '').trim();
    const movie = JSON.parse(raw);
    document.getElementById('rTitle').textContent = movie.title + (movie.year ? ' (' + movie.year + ')' : '');
    if (movie.note) document.getElementById('rNote').textContent = 'Note: ' + movie.note;
    btn.disabled = false;
    btn.textContent = 'Identify & Check';
    await checkPlex(movie.title, movie.year);
  } catch(e) {
    document.getElementById('rTitle').textContent = 'Could not identify movie';
    document.getElementById('badge').className = 'badge b-no';
    document.getElementById('badge').textContent = 'Error identifying';
    document.getElementById('rErr').textContent = e.message;
    btn.disabled = false;
    btn.textContent = 'Identify & Check';
  }
}
async function checkPlex(title, year) {
  const badge = document.getElementById('badge');
  const matchesEl = document.getElementById('matches');
  const plexUrl = document.getElementById('plexUrl').value.trim();
  const plexToken = document.getElementById('plexToken').value.trim();
  if (!plexToken || !plexUrl) { badge.className = 'badge b-no'; badge.textContent = 'No token set'; return; }
  try {
    const res = await fetch(plexUrl + '/library/search?query=' + encodeURIComponent(title) + '&type=1&X-Plex-Token=' + plexToken);
    if (!res.ok) throw new Error('Plex returned ' + res.status);
    const xml = await res.text();
    const doc = new DOMParser().parseFromString(xml, 'text/xml');
    const items = Array.from(doc.querySelectorAll('Video'));
    const q = title.toLowerCase().substring(0, Math.min(title.length, 10));
    const matches = items.filter(item => (item.getAttribute('title') || '').toLowerCase().includes(q));
    if (matches.length === 0) {
      badge.className = 'badge b-no';
      badge.textContent = 'Not in Plex library';
    } else {
      badge.className = 'badge b-yes';
      badge.textContent = matches.length === 1 ? 'Found in Plex!' : matches.length + ' matches found';
      matchesEl.innerHTML = matches.map(item => {
        const t = item.getAttribute('title') || '';
        const y = item.getAttribute('year') || '';
        const lib = item.getAttribute('librarySectionTitle') || '';
        return '<div class="match-item"><div class="match-title">' + t + '</div><div class="match-meta">' + [y, lib].filter(Boolean).join(' · ') + '</div></div>';
      }).join('');
    }
  } catch(e) {
    badge.className = 'badge b-no';
    badge.textContent = 'Error';
    document.getElementById('rErr').textContent = e.message + ' — make sure Tailscale is on and Plex is running.';
  }
}
loadConfig();
</script>
</body>
</html>
